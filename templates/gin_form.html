<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Issue Material (GIN)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background-color: #f8f9fc; padding: 15px; font-family: sans-serif; }</style>
</head>
<body>
<div class="container p-0" style="max-width: 600px;">
    <div class="card shadow-sm border-0 rounded-3 p-3 p-md-4 mt-2 border-top border-danger border-4">
        <h5 class="text-danger mb-4 fw-bold"><i class="fas fa-truck-loading me-2"></i>ဆိုက်သို့ ပစ္စည်းထုတ်ပေးရန် (GIN)</h5>
        <form action="/add_gin" method="POST">
            <div class="row g-2 mb-3">
                <div class="col-12 col-md-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">GIN ဖောင်နံပါတ်</label>
                    <input type="text" name="form_no" class="form-control" placeholder="ဥပမာ - GIN-001" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ငွေစာရင်း ဘောက်ချာနံပါတ်</label>
                    <input type="text" name="voucher_no" class="form-control" placeholder="ဥပမာ - JV-0001" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ပစ္စည်းအမည် (Item Name)</label>
                <input type="text" name="item_name" class="form-control" required>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-12 col-sm-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ထုတ်ပေးမည့် အရေအတွက်</label>
                    <input type="number" step="0.01" name="qty" class="form-control" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ခန့်မှန်း တန်ဖိုး (Estimated Value)</label>
                    <input type="number" step="0.01" name="amount" class="form-control" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ပစ္စည်းပို့မည့် ဆိုက် (Target Site)</label>
                <select name="location" class="form-select" required>
                    <option value="">-- ရွေးချယ်ပါ --</option>
                    {% for loc in locations %}
                    <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2"><i class="fas fa-paper-plane me-2"></i>ထုတ်ပေးမည် (Issue)</button>
            <a href="/requisition" class="btn btn-outline-secondary w-100 mt-2">နောက်သို့</a>
        </form>
    </div>
</div>
</body>
</html>
