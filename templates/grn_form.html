<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add GRN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fc; padding: 40px; font-family: sans-serif; }</style>
</head>
<body>
<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-0 rounded-3 p-4">
        <h4 class="text-success mb-4">ပစ္စည်းအဝင်စာရင်း (GRN) သွင်းရန်</h4>
        <form action="/add_grn" method="POST">
            
            <div class="mb-3 p-3 bg-light rounded border border-info">
                <label class="text-info fw-bold mb-2"><i class="fas fa-link me-2"></i>ချိတ်ဆက်မည့် Purchase Order (PO)</label>
                <select name="po_id" id="po_select" class="form-select border-info" onchange="autoFillPO()">
                    <option value="">-- PO မပါဘဲ တိုက်ရိုက်သွင်းမည် --</option>
                    {% for po in approved_pos %}
                    <option value="{{ po[0] }}" data-item="{{ po[3] }}" data-qty="{{ po[4] }}" data-amount="{{ po[5] }}">
                        {{ po[2] }} ({{ po[3] }} - {{ po[4] }} ခု)
                    </option>
                    {% endfor %}
                </select>
                <small class="text-muted mt-1 d-block">Approve လုပ်ထားသော PO များသာ ပေါ်ပါမည်။</small>
            </div>
            
            <div class="mb-3">
                <label>ပစ္စည်းအမည် (Item Name)</label>
                <input type="text" name="item_name" id="item_name" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>အရေအတွက် (Qty)</label>
                    <input type="number" name="qty" id="qty" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>စုစုပေါင်း ကျသင့်ငွေ (Total Amount)</label>
                    <input type="number" name="amount" id="amount" class="form-control" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label>ပေးချေမှု ပုံစံ (Payment Type)</label>
                <select name="payment_type" class="form-select" required>
                    <option value="Cash">လက်ငင်း (Cash)</option>
                    <option value="Credit">အကြွေး (Credit)</option>
                </select>
            </div>
            <div class="mb-4">
                <label>ရောက်ရှိမည့် နေရာ (Location)</label>
                <select name="location" class="form-select" required>
                    <option value="">-- ရွေးချယ်ပါ --</option>
                    {% for loc in locations %}
                    <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">စာရင်းသွင်းမည် (Save)</button>
            <a href="/inventory" class="btn btn-outline-secondary w-100 mt-2">နောက်သို့</a>
        </form>
    </div>
</div>

<script>
    function autoFillPO() {
        var select = document.getElementById("po_select");
        var selectedOption = select.options[select.selectedIndex];
        
        if (select.value !== "") {
            document.getElementById("item_name").value = selectedOption.getAttribute("data-item");
            document.getElementById("qty").value = selectedOption.getAttribute("data-qty");
            document.getElementById("amount").value = selectedOption.getAttribute("data-amount");
        } else {
            // PO မရွေးထားရင် အကွက်တွေ ပြန်လွတ်ပေးမည်
            document.getElementById("item_name").value = "";
            document.getElementById("qty").value = "";
            document.getElementById("amount").value = "";
        }
    }
</script>

</body>
</html>
