<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #fff; padding: 20px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="text-end mb-3 no-print">
        <button onclick="window.print()" class="btn btn-primary">Print / PDF Save လုပ်မည်</button>
    </div>
    <h3 class="text-center mb-4">Creative Paradise - Inventory Report</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>နေ့စွဲ</th><th>Form Type</th><th>ဘောက်ချာ No.</th><th>ပစ္စည်းအမည်</th><th>အဝင်</th><th>အထွက်</th><th>တည်နေရာ</th>
            </tr>
        </thead>
        <tbody>
            {% for r in items %}
            <tr>
                <td>{{ r[0] }}</td><td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td>
                <td>{{ r[4] }}</td><td>{{ r[5] }}</td><td>{{ r[6] }}</td>
            </tr>
            {% endfor %}
            <tr class="fw-bold table-light">
                <td colspan="4" class="text-end">စုစုပေါင်း:</td>
                <td class="text-success">{{ total_in }}</td>
                <td class="text-danger">{{ total_out }}</td>
                <td></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
