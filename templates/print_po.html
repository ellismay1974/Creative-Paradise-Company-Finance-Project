<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print PO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #fff; padding: 20px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div class="text-end mb-3 no-print">
        <button onclick="window.print()" class="btn btn-primary">Print / PDF Save လုပ်မည်</button>
    </div>
    <h3 class="text-center mb-4">Creative Paradise - Purchase Orders Report</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>နေ့စွဲ</th><th>PO No.</th><th>ပစ္စည်းအမည်</th><th>အရေအတွက်</th><th>ခန့်မှန်းတန်ဖိုး</th><th>Supplier</th><th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for r in pos %}
            <tr>
                <td>{{ r[0].strftime('%Y-%m-%d') if r[0] else '' }}</td>
                <td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td>
                <td>{{ '{:,.0f}'.format(r[4]) }}</td><td>{{ r[5] }}</td><td>{{ r[7] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
