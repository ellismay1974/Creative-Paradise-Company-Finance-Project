<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Transfer - Creative Paradise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background-color: #f4f6f9; padding: 20px; font-family: sans-serif; }</style>
</head>
<body>
<div class="container p-0" style="max-width: 600px;">
    <div class="card shadow-sm border-0 border-top border-warning border-4 rounded-3 p-3 p-md-4 mt-3">
        <h5 class="text-warning mb-4 fw-bold text-center" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);"><i class="fas fa-exchange-alt me-2"></i>ပစ္စည်းလွှဲပြောင်းခြင်း</h5>
        <form action="/add_transfer" method="POST">
            
            <div class="row g-2 mb-3">
                <div class="col-12 col-md-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">လွှဲပြောင်းမှု ဖောင်နံပါတ်</label>
                    <input type="text" name="form_no" class="form-control" placeholder="ဥပမာ - TRN-001" required>
                </div>
                <div class="col-12 col-md-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem; font-weight: 600;">ငွေစာရင်း ဘောက်ချာနံပါတ်</label>
                    <input type="text" name="voucher_no" class="form-control" placeholder="ဥပမာ - JV-0001" required>
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-12 col-sm-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem;">ပေးပို့မည့်ဆိုက်</label>
                    <select class="form-select" name="from_location" required>
                        <option value="">-- ရွေးချယ်ပါ --</option>
                        {% for loc in locations %}
                        <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem;">လက်ခံမည့်ဆိုက်</label>
                    <select class="form-select" name="to_location" required>
                        <option value="">-- ရွေးချယ်ပါ --</option>
                        {% for loc in locations %}
                        <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted" style="font-size: 0.9rem;">ပစ္စည်းအမည်</label>
                <input type="text" name="item_name" class="form-control" required>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem;">အရေအတွက်</label>
                    <input type="number" step="0.01" name="qty" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label text-muted" style="font-size: 0.9rem;">တန်ဖိုး (Ks)</label>
                    <input type="number" step="0.01" name="amount" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-warning w-100 text-dark fw-bold py-2 mb-2"><i class="fas fa-save me-2"></i>လွှဲပြောင်းမည်</button>
            <a href="/inventory" class="btn btn-outline-secondary w-100">နောက်သို့</a>
        </form>
    </div>
</div>
</body>
</html>
