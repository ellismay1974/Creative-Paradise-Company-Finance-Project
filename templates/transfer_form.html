<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Site Transfer - Creative Paradise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f4f6f9; }
        .form-card { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-title { font-weight: 800; color: #f6c23e; margin-bottom: 25px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);}
    </style>
</head>
<body>
<div class="container">
    <div class="form-card border-top border-warning border-4">
        <h4 class="form-title text-center text-warning"><i class="fas fa-exchange-alt me-2"></i>ဆိုက်အချင်းချင်း ပစ္စည်းလွှဲပြောင်းခြင်း (Transfer)</h4>
        
        <form action="/add_transfer" method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label font-weight-bold text-muted">ပေးပို့မည့်ဆိုက် (From Location)</label>
                    <select class="form-select" name="from_location" required>
                        <option value="">-- ရွေးချယ်ပါ --</option>
                        {% for loc in locations %}
                        <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label font-weight-bold text-muted">လက်ခံမည့်ဆိုက် (To Location)</label>
                    <select class="form-select" name="to_location" required>
                        <option value="">-- ရွေးချယ်ပါ --</option>
                        {% for loc in locations %}
                        <option value="{{ loc[0] }}">{{ loc[1] }} ({{ loc[2] }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label font-weight-bold text-muted">ပစ္စည်းအမည် (Item Name)</label>
                <input type="text" name="item_name" class="form-control" placeholder="ဥပမာ - ဘိလပ်မြေ၊ သံချောင်း" required>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label font-weight-bold text-muted">လွှဲပြောင်းမည့် အရေအတွက် (Qty)</label>
                    <input type="number" step="0.01" name="qty" class="form-control" placeholder="0" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label font-weight-bold text-muted">ခန့်မှန်းတန်ဖိုး (Amount Ks)</label>
                    <input type="number" step="0.01" name="amount" class="form-control" placeholder="လွှဲပြောင်းမည့် တန်ဖိုး" required>
                    <small class="text-secondary" style="font-size: 0.75rem;">(စာရင်းပြောင်းရန်အတွက်သာ)</small>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/inventory" class="btn btn-secondary px-4">နောက်သို့</a>
                <button type="submit" class="btn btn-warning px-4 text-dark font-weight-bold"><i class="fas fa-save me-2"></i>မှတ်တမ်းတင်မည်</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
