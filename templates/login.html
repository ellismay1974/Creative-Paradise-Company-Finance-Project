<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Paradise ERP - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 10px; padding: 30px; background: white; width: 100%; max-width: 400px; }
        .brand-text { color: #0d6efd; font-weight: bold; }
    </style>

    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/icon.png">
</head>
<body>

<div class="login-card">
    <h3 class="text-center brand-text mb-4">Creative Paradise<br><small class="text-muted fs-6">ERP System</small></h3>
    
    <div id="alertBox" class="alert d-none"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">အသုံးပြုသူအမည် (Username)</label>
            <input type="text" id="username" class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">စကားဝှက် (Password)</label>
            <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">စနစ်ထဲသို့ ဝင်မည်</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const alertBox = document.getElementById('alertBox');

        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        
        const result = await response.json();
        
        if(result.status === 'success') {
            alertBox.className = 'alert alert-success';
            alertBox.innerText = result.message;
            setTimeout(() => window.location.href = '/', 1000); // အောင်မြင်ပါက Dashboard သို့ သွားမည်
        } else {
            alertBox.className = 'alert alert-danger';
            alertBox.innerText = result.message;
        }
    });
</script>

</body>
</html>
